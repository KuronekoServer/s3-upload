name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: s3-upload-linux-amd64
            archive: s3-upload-linux-amd64.tar.gz
          - goos: windows
            goarch: amd64
            artifact: s3-upload-windows-amd64
            binary_ext: .exe
            archive: s3-upload-windows-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ${{ matrix.artifact }}/s3-upload${{ matrix.binary_ext }} \
            .

      - name: Copy .env.example
        run: cp .env.example ${{ matrix.artifact }}/.env.example

      - name: Archive (Linux)
        if: matrix.goos == 'linux'
        run: tar -czf ${{ matrix.archive }} -C ${{ matrix.artifact }} .

      - name: Archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd ${{ matrix.artifact }}
          zip ../${{ matrix.archive }} *

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
