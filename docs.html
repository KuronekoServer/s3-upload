<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Upload API OpenAPI Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
      :root {
        --bg: #f7f1e8;
        --ink: #1d1d1f;
        --accent: #0b6e4f;
        --accent-soft: #dcefe7;
        --panel: rgba(255, 252, 247, 0.84);
        --line: rgba(29, 29, 31, 0.1);
        --shadow: 0 24px 80px rgba(76, 56, 35, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(240, 169, 79, 0.26), transparent 28%),
          radial-gradient(circle at 85% 10%, rgba(11, 110, 79, 0.2), transparent 24%),
          linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: linear-gradient(rgba(29, 29, 31, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(29, 29, 31, 0.025) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.45));
      }

      .shell {
        width: min(1200px, calc(100vw - 32px));
        margin: 24px auto;
        background: var(--panel);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: rise 420ms ease-out;
      }

      .hero {
        position: relative;
        padding: 40px 32px 28px;
        border-bottom: 1px solid var(--line);
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -80px;
        top: -90px;
        width: 260px;
        height: 260px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(11, 110, 79, 0.2), rgba(11, 110, 79, 0));
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(11, 110, 79, 0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 0.95;
        letter-spacing: -0.05em;
        max-width: 720px;
      }

      .lede {
        margin: 0;
        max-width: 760px;
        font-size: 16px;
        line-height: 1.7;
        color: rgba(29, 29, 31, 0.74);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .meta-chip {
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        font-size: 13px;
      }

      .meta-chip strong {
        display: block;
        margin-bottom: 3px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(29, 29, 31, 0.55);
      }

      .swagger-wrap {
        padding: 12px;
      }

      #swagger-ui {
        border-radius: 24px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.7);
      }

      .swagger-ui .topbar {
        display: none;
      }

      .swagger-ui,
      .swagger-ui .info .title,
      .swagger-ui .opblock-tag,
      .swagger-ui .opblock .opblock-summary-method,
      .swagger-ui .btn,
      .swagger-ui .tab li,
      .swagger-ui input,
      .swagger-ui select,
      .swagger-ui textarea {
        font-family: "Space Grotesk", sans-serif;
      }

      .swagger-ui .scheme-container {
        background: transparent;
        box-shadow: none;
        padding: 24px 24px 0;
      }

      .swagger-ui .info {
        margin: 0;
        padding: 8px 24px 0;
      }

      .swagger-ui .info .title {
        color: var(--ink);
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: -0.04em;
      }

      .swagger-ui .info p,
      .swagger-ui .markdown p,
      .swagger-ui .markdown li,
      .swagger-ui .responses-inner h4,
      .swagger-ui .response-col_status,
      .swagger-ui .response-col_description {
        color: rgba(29, 29, 31, 0.75);
      }

      .swagger-ui .opblock-tag {
        border-bottom-color: var(--line);
        color: var(--ink);
      }

      .swagger-ui .opblock {
        border-radius: 18px;
        overflow: hidden;
        border-width: 1px;
        box-shadow: 0 16px 36px rgba(29, 29, 31, 0.06);
      }

      .swagger-ui .opblock.opblock-post {
        border-color: rgba(11, 110, 79, 0.25);
        background: rgba(11, 110, 79, 0.06);
      }

      .swagger-ui .opblock.opblock-post .opblock-summary {
        border-color: rgba(11, 110, 79, 0.18);
      }

      .swagger-ui .opblock .opblock-summary-method {
        border-radius: 999px;
        background: var(--accent);
        min-width: 72px;
      }

      .swagger-ui .btn.authorize {
        border-color: rgba(11, 110, 79, 0.22);
        color: var(--accent);
      }

      .swagger-ui .btn.execute {
        background: var(--accent);
        border-color: var(--accent);
      }

      .swagger-ui .btn.execute:hover {
        background: #09583f;
        border-color: #09583f;
      }

      .swagger-ui .responses-table .response-undocumented {
        color: rgba(29, 29, 31, 0.65);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100vw - 16px, 100%);
          margin: 8px auto;
          border-radius: 18px;
        }

        .hero {
          padding: 28px 20px 20px;
        }

        .swagger-wrap {
          padding: 8px;
        }

        .swagger-ui .scheme-container,
        .swagger-ui .info {
          padding-left: 16px;
          padding-right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <span class="eyebrow">OpenAPI 3.1</span>
        <h1>S3 Upload API</h1>
        <p class="lede">実装に合わせた OpenAPI 仕様を /openapi.json として配信し、このページでは Swagger UI で閲覧できます。Try it out から multipart/form-data のアップロードもそのまま試せます。</p>
        <div class="meta">
          <div class="meta-chip">
            <strong>Spec</strong>
            /openapi.json
          </div>
          <div class="meta-chip">
            <strong>Endpoint</strong>
            POST /api/v1/upload
          </div>
          <div class="meta-chip">
            <strong>Auth</strong>
            X-Auth-Key when AUTH_ENABLED=true
          </div>
        </div>
      </section>
      <section class="swagger-wrap">
        <div id="swagger-ui"></div>
      </section>
    </div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        docExpansion: "list",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        displayRequestDuration: true,
        persistAuthorization: true,
        tryItOutEnabled: true
      });
    </script>
  </body>
</html>
